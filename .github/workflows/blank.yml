name: test-winget-manifest

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-winget-manifest:
    runs-on: windows-latest

    env:
      PACKAGE_IDENTIFIER: ConnectingApps.Kemforge
      PACKAGE_VERSION: "1.3.2"
      INSTALLER_URL: https://github.com/ConnectingApps/kemforge/releases/download/v1.3.2/kemforge.zip
      INSTALLER_SHA256: FBF0E82058E8F2814E1269C0EA2B953C8678F5592CAD6AA8EC8C49E4419A23F4
      SHORT_DESCRIPTION: "A modern, curl-compatible CLI tool for making web requests with Post-Quantum Cryptography (PQC) support."
      PUBLISHER: ConnectingApps
      PACKAGE_NAME: Kemforge
      MANIFEST_VERSION: "1.9.0"
      MANIFEST_DIR: manifests/c/ConnectingApps/Kemforge/1.3.2

    steps:
      - uses: actions/checkout@v4

      - name: Create manifest directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "$env:MANIFEST_DIR" -Force
          Write-Host "Created manifest directory: $env:MANIFEST_DIR"

      - name: Generate version manifest
        shell: pwsh
        run: |
          $content = @"
          PackageIdentifier: $env:PACKAGE_IDENTIFIER
          PackageVersion: $env:PACKAGE_VERSION
          DefaultLocale: en-US
          ManifestType: version
          ManifestVersion: $env:MANIFEST_VERSION
          "@
          $content | Out-File -FilePath "$env:MANIFEST_DIR/$env:PACKAGE_IDENTIFIER.yaml" -Encoding utf8

      - name: Generate installer manifest
        shell: pwsh
        run: |
          $content = @"
          PackageIdentifier: $env:PACKAGE_IDENTIFIER
          PackageVersion: $env:PACKAGE_VERSION
          InstallerType: zip
          NestedInstallerType: portable
          NestedInstallerFiles:
            - RelativeFilePath: kemforge.exe
              PortableCommandAlias: kemforge
          Commands:
            - kemforge
          Installers:
            - Architecture: x64
              InstallerUrl: $env:INSTALLER_URL
              InstallerSha256: $env:INSTALLER_SHA256
          ManifestType: installer
          ManifestVersion: $env:MANIFEST_VERSION
          "@
          $content | Out-File -FilePath "$env:MANIFEST_DIR/$env:PACKAGE_IDENTIFIER.installer.yaml" -Encoding utf8

      - name: Generate locale manifest
        shell: pwsh
        run: |
          $content = @"
          PackageIdentifier: $env:PACKAGE_IDENTIFIER
          PackageVersion: $env:PACKAGE_VERSION
          PackageLocale: en-US
          Publisher: $env:PUBLISHER
          PackageName: $env:PACKAGE_NAME
          ShortDescription: $env:SHORT_DESCRIPTION
          License: MIT
          ManifestType: defaultLocale
          ManifestVersion: $env:MANIFEST_VERSION
          "@
          $content | Out-File -FilePath "$env:MANIFEST_DIR/$env:PACKAGE_IDENTIFIER.locale.en-US.yaml" -Encoding utf8

      - name: Upload manifest files
        uses: actions/upload-artifact@v6
        with:
          name: winget-manifest
          path: ${{ env.MANIFEST_DIR }}

      - name: Print generated manifests
        shell: pwsh
        run: |
          Write-Host "=== Version Manifest ==="
          Get-Content "$env:MANIFEST_DIR/$env:PACKAGE_IDENTIFIER.yaml"
          Write-Host ""
          Write-Host "=== Installer Manifest ==="
          Get-Content "$env:MANIFEST_DIR/$env:PACKAGE_IDENTIFIER.installer.yaml"
          Write-Host ""
          Write-Host "=== Locale Manifest ==="
          Get-Content "$env:MANIFEST_DIR/$env:PACKAGE_IDENTIFIER.locale.en-US.yaml"

      - name: Download ZIP and verify SHA256
        shell: pwsh
        run: |
          $zipPath = "$env:RUNNER_TEMP/kemforge.zip"
          Write-Host "Downloading from: $env:INSTALLER_URL"
          Invoke-WebRequest -Uri $env:INSTALLER_URL -OutFile $zipPath -UseBasicParsing

          $actualHash = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash
          Write-Host "Expected SHA256: $env:INSTALLER_SHA256"
          Write-Host "Actual   SHA256: $actualHash"

          if ($actualHash -ne $env:INSTALLER_SHA256) {
            Write-Error "SHA256 mismatch! Expected $env:INSTALLER_SHA256 but got $actualHash"
            exit 1
          }
          Write-Host "SHA256 verification passed."

      - name: Validate manifest with winget
        shell: pwsh
        run: |
          $manifestPath = Resolve-Path $env:MANIFEST_DIR
          Write-Host "Validating manifest at: $manifestPath"
          winget validate $manifestPath
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::warning::winget validate returned exit code $LASTEXITCODE"
          }

      - name: Install via manifest
        shell: pwsh
        run: |
          $manifestPath = Resolve-Path $env:MANIFEST_DIR
          Write-Host "Installing from manifest: $manifestPath"
          winget install --manifest $manifestPath --accept-package-agreements --accept-source-agreements
          Write-Host "Installation exit code: $LASTEXITCODE"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "winget install failed with exit code $LASTEXITCODE"
            exit 1
          }
          Write-Host "Installation completed successfully."

      - name: Add kemforge to PATH
        shell: pwsh
        run: |
          $searchRoot = "$env:LOCALAPPDATA\Microsoft\WinGet\Packages"
          Write-Host "Searching for kemforge.exe under: $searchRoot"
          $exe = Get-ChildItem -Path $searchRoot -Filter "kemforge.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) {
            Write-Error "kemforge.exe not found under $searchRoot"
            exit 1
          }
          $dir = $exe.DirectoryName
          Write-Host "Found kemforge.exe at: $($exe.FullName)"
          Write-Host "Adding to PATH: $dir"
          echo $dir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify kemforge runs
        shell: pwsh
        run: |
          Write-Host "Running: kemforge --help"
          $output = & kemforge --help 2>&1
          $exitCode = $LASTEXITCODE
          Write-Host $output
          if ($exitCode -ne 0) {
            Write-Error "kemforge --help failed with exit code $exitCode"
            exit 1
          }
          if ([string]::IsNullOrWhiteSpace($output)) {
            Write-Error "kemforge --help produced no output"
            exit 1
          }
          Write-Host "kemforge verification passed."
